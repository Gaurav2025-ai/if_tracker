<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FAST — Intermittent Fasting Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1b2e;
            --card: #222440;
            --card-hover: #2a2d50;
            --text: #eaeaf5;
            --text-muted: #8b8db0;
            --border: #2f3258;
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.3);
            --success: #2dd4a8;
            --success-glow: rgba(45, 212, 168, 0.25);
            --warning: #ffb347;
            --danger: #ff6b6b;
            --blue: #6cb4ee;
            --cyan: #5ef5e0;
            --orange: #ffa06c;
            --gradient-1: linear-gradient(135deg, #00e5ff, #76ff03);
            --gradient-2: linear-gradient(135deg, #2dd4a8, #5ef5e0);
            --gradient-3: linear-gradient(135deg, #ffb347, #ff6b6b);
            --shadow: 0 6px 24px rgba(0, 0, 0, 0.25);
            --radius: 16px;
            --xp-color: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Softer animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0, 229, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(45, 212, 168, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Header */
        .header {
            background: rgba(18, 18, 31, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0; z-index: 100;
        }

        .header h1 {
            font-family: 'Space Grotesk';
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-icon {
            width: 34px; height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-icon:hover { border-color: var(--primary); box-shadow: 0 0 12px var(--primary-glow); }

        /* ChatGPT FAB */
        .chat-fab {
            position: fixed;
            bottom: 85px;
            right: 16px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10a37f, #1acea0);
            border: none;
            box-shadow: 0 4px 20px rgba(16, 163, 127, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99;
            transition: all 0.3s;
            text-decoration: none;
        }

        .chat-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(16, 163, 127, 0.5);
        }

        .chat-fab svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        /* Day Selector */
        .day-selector {
            display: flex;
            gap: 0.4rem;
            padding: 0.75rem 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .day-selector::-webkit-scrollbar { display: none; }

        .day-pill {
            flex-shrink: 0;
            width: 44px; height: 56px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--card);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            gap: 0.1rem;
        }

        .day-pill .dp-day { font-size: 0.6rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .day-pill .dp-num { font-family: 'Space Grotesk'; font-size: 1rem; font-weight: 700; }
        .day-pill.active { border-color: var(--primary); background: rgba(0,229,255,0.1); box-shadow: 0 0 12px var(--primary-glow); }
        .day-pill.active .dp-num { color: var(--primary); }
        .day-pill.has-data { border-color: rgba(0, 214, 143, 0.3); }
        .day-pill.has-data .dp-num { color: var(--success); }
        .day-pill:hover { border-color: var(--primary); transform: scale(1.05); }

        /* Sections */
        .content { padding: 0 1rem; position: relative; z-index: 1; }
        section { margin-bottom: 1rem; }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .card:hover { border-color: rgba(0,229,255,0.2); }

        .card-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        /* Weight Hero Section */
        .weight-hero {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .weight-hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at center, rgba(108, 92, 231, 0.05), transparent 60%);
            animation: weightGlow 5s ease-in-out infinite alternate;
        }

        @keyframes weightGlow {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .weight-value {
            font-family: 'Space Grotesk';
            font-size: 3.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .weight-unit { font-size: 1.2rem; opacity: 0.7; }
        .weight-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; position: relative; }
        .weight-change { font-family: 'Space Grotesk'; font-size: 0.9rem; font-weight: 600; margin-top: 0.5rem; position: relative; }
        .weight-change.loss { color: var(--success); }
        .weight-change.gain { color: var(--danger); }

        .weight-input-row {
            display: flex; gap: 0.75rem; margin-top: 1rem; position: relative;
            align-items: center; justify-content: center;
        }

        .weight-input {
            width: 120px; padding: 0.6rem; border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 1.2rem; font-family: 'Space Grotesk'; font-weight: 600;
            background: var(--bg); color: var(--text); text-align: center;
        }
        .weight-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 12px var(--primary-glow); }

        .btn {
            padding: 0.6rem 1.2rem; border: none; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter'; transition: all 0.2s;
        }
        .btn-glow { background: var(--gradient-1); color: white; box-shadow: 0 4px 15px var(--primary-glow); }
        .btn-glow:hover { transform: scale(1.03); box-shadow: 0 6px 20px var(--primary-glow); }
        .btn-green { background: var(--gradient-2); color: #0a0a12; box-shadow: 0 4px 15px var(--success-glow); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }

        /* Timer */
        .timer-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .timer-ring {
            width: 200px; height: 200px;
            margin: 1rem auto;
            position: relative;
        }

        .timer-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
        .timer-ring .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; stroke: url(#timerGradient); }

        .timer-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
        }

        .timer-digits {
            font-family: 'JetBrains Mono';
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -1px;
        }

        .timer-sub {
            font-size: 0.8rem; color: var(--text-muted);
            margin-top: 0.25rem; font-weight: 500;
        }

        .timer-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-fasting { background: rgba(0,229,255,0.15); color: var(--primary); border: 1px solid rgba(0,229,255,0.3); }
        .status-eating { background: rgba(0,214,143,0.15); color: var(--success); border: 1px solid rgba(0,214,143,0.3); }
        .status-idle { background: rgba(107,112,148,0.15); color: var(--text-muted); border: 1px solid var(--border); }

        .timer-btns { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.25rem; }

        /* Protocol selector */
        .protocol-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .proto-btn {
            flex: 1; padding: 0.6rem; border-radius: 10px; border: 1.5px solid var(--border);
            background: var(--bg); font-size: 0.85rem; font-weight: 700; font-family: 'Space Grotesk';
            cursor: pointer; text-align: center; color: var(--text-muted); transition: all 0.2s;
        }
        .proto-btn.active { border-color: var(--primary); background: rgba(0,229,255,0.1); color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        /* Routine */
        .routine-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.8rem 0; border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none; transition: all 0.2s;
        }
        .routine-item:last-child { border-bottom: none; }
        .routine-item:hover { padding-left: 0.25rem; }

        .r-check {
            width: 24px; height: 24px; border-radius: 7px;
            border: 2px solid var(--border); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 0.7rem;
        }

        .routine-item.done .r-check { background: var(--success); border-color: var(--success); color: white; box-shadow: 0 0 10px var(--success-glow); }
        .routine-item.done .r-text { text-decoration: line-through; color: var(--text-muted); }

        .r-time { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--primary); min-width: 55px; font-weight: 500; }
        .r-text { font-size: 0.88rem; font-weight: 500; color: var(--text); }

        /* Water */
        .water-row { display: flex; align-items: center; gap: 1rem; justify-content: center; margin: 0.75rem 0; }
        .water-count { font-family: 'Space Grotesk'; font-size: 2rem; font-weight: 700; color: var(--blue); min-width: 50px; text-align: center; }
        .water-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--blue); background: rgba(79,172,254,0.1); color: var(--blue); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .water-btn:hover { background: var(--blue); color: white; box-shadow: 0 0 15px rgba(79,172,254,0.4); }

        /* Motivation */
        .motivation {
            background: rgba(0,229,255,0.05);
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            font-style: italic;
            font-size: 0.88rem;
            color: var(--text-muted);
            position: relative;
            overflow: hidden;
        }

        .motivation::before {
            content: '"';
            position: absolute;
            top: -10px; left: 10px;
            font-size: 4rem;
            color: rgba(0, 229, 255, 0.12);
            font-family: serif;
        }

        .motivation span { position: relative; }

        /* Food note */
        .food-note {
            width: 100%; padding: 0.7rem; border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 0.88rem; font-family: 'Inter'; background: var(--bg); color: var(--text);
            resize: vertical; min-height: 50px;
        }
        .food-note:focus { outline: none; border-color: var(--primary); }

        /* Bottom nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(18,18,31,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around;
            padding: 0.5rem 0; z-index: 100;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; cursor: pointer; padding: 0.3rem 0.8rem; border-radius: 10px; color: var(--text-muted); font-size: 0.6rem; font-weight: 600; transition: all 0.2s; }
        .nav-item.active { color: var(--primary); background: rgba(0,229,255,0.1); }
        .nav-item .nav-icon { font-size: 1.3rem; }

        /* Tabs */
        .tab { display: none; }
        .tab.active { display: block; }

        /* Chart */
        .chart-box { width: 100%; height: 160px; margin: 0.5rem 0; }
        .chart-box canvas { width: 100%; height: 100%; }

        /* Responsive */
        @media (min-width: 500px) {
            .content { max-width: 480px; margin: 0 auto; }
        }

        /* Mobile touch improvements */
        @media (max-width: 500px) {
            .timer-ring { width: 180px; height: 180px; }
            .timer-digits { font-size: 1.7rem; }
            .weight-value { font-size: 3rem; }
            .routine-item { padding: 1rem 0; }
            .r-check { width: 28px; height: 28px; border-radius: 8px; font-size: 0.8rem; }
            .r-text { font-size: 0.92rem; }
            .water-btn { width: 48px; height: 48px; font-size: 1.4rem; }
            .water-count { font-size: 2.5rem; }
            .btn { padding: 0.8rem 1.5rem; font-size: 0.95rem; }
            .day-pill { width: 48px; height: 60px; }
        }

        /* XP & Level Bar - removed */

        /* Toast notification */
        .toast {
            position: fixed;
            top: 70px; left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--card);
            border: 1px solid var(--success);
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--success);
            box-shadow: 0 8px 30px rgba(45, 212, 168, 0.2);
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="header">
    <h1>⚡ FAST</h1>
    <div style="display:flex; gap:0.5rem;">
        <button class="btn-icon" onclick="resetAll()">🗑️</button>
    </div>
</header>

<!-- Day Selector -->
<div class="day-selector" id="daySelector"></div>

<div class="content">

<!-- MOTIVATION -->
<div class="motivation" id="motivationBox">
    <span id="quoteText">Loading motivation...</span>
</div>

<!-- TAB: TRACK -->
<div class="tab active" id="tab-track">

    <!-- Weight Hero -->
    <section>
        <div class="weight-hero">
            <div class="weight-value" id="weightDisplay">--<span class="weight-unit"> kg</span></div>
            <div class="weight-label">Today's Weight</div>
            <div class="weight-change" id="weightChange"></div>
            <div class="weight-input-row">
                <input type="number" step="0.1" class="weight-input" id="wInput" placeholder="kg">
                <button class="btn btn-glow" onclick="saveWeight()">Log</button>
            </div>
        </div>
    </section>

    <!-- Fasting Timer -->
    <section>
        <div class="timer-card">
            <div class="card-title">Fasting Timer</div>
            <div class="protocol-row">
                <div class="proto-btn active" id="proto16" onclick="setProto('16:8')">16:8</div>
                <div class="proto-btn" id="proto14" onclick="setProto('14:10')">14:10</div>
            </div>
            <div class="timer-ring">
                <svg viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00e5ff"/>
                            <stop offset="100%" stop-color="#76ff03"/>
                        </linearGradient>
                    </defs>
                    <circle class="ring-bg" cx="50" cy="50" r="42"/>
                    <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="42" stroke-dasharray="263.9" stroke-dashoffset="263.9"/>
                </svg>
                <div class="timer-center">
                    <div class="timer-digits" id="timerDigits">00:00:00</div>
                    <div class="timer-sub" id="timerSub">Tap Start to begin</div>
                </div>
            </div>
            <div class="timer-status status-idle" id="timerStatus">Ready</div>
            <div class="timer-btns">
                <button class="btn btn-glow" id="btnStart" onclick="startEating()">🍽️ Start Eating</button>
                <button class="btn btn-green" id="btnStop" onclick="stopEating()" style="display:none;">⏸️ Stop Eating</button>
                <button class="btn btn-outline" id="btnReset" onclick="resetTimer()" style="display:none;">↺ Reset</button>
            </div>
        </div>
    </section>

    <!-- Water -->
    <section>
        <div class="card">
            <div class="card-title">💧 Water Intake</div>
            <div class="water-row">
                <button class="water-btn" onclick="changeWater(-1)">−</button>
                <div class="water-count" id="waterCount">0</div>
                <button class="water-btn" onclick="changeWater(1)">+</button>
            </div>
            <div style="text-align:center; font-size: 0.75rem; color: var(--text-muted);">glasses today</div>
        </div>
    </section>

    <!-- Routine -->
    <section>
        <div class="card">
            <div class="card-title">📋 Daily Routine</div>
            <div id="routineList"></div>
        </div>
    </section>

    <!-- Food Notes -->
    <section>
        <div class="card">
            <div class="card-title">📝 Food Notes</div>
            <textarea class="food-note" id="foodNote" placeholder="Extra snacks, deviations, notes..." oninput="saveFoodNote()"></textarea>
        </div>
    </section>
</div>

<!-- TAB: ANALYTICS -->
<div class="tab" id="tab-analytics">
    <section>
        <div class="card">
            <div class="card-title">📊 Weight Trend</div>
            <div class="chart-box"><canvas id="chartCanvas"></canvas></div>
        </div>
    </section>
    <section>
        <div class="card">
            <div class="card-title">Summary (15 Days)</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.75rem;">
                <div style="text-align:center; padding:1rem; background:var(--bg); border-radius:10px;">
                    <div style="font-family:'Space Grotesk'; font-size:1.6rem; font-weight:700; color:var(--primary);" id="sAvgFast">-</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">AVG FAST HRS</div>
                </div>
                <div style="text-align:center; padding:1rem; background:var(--bg); border-radius:10px;">
                    <div style="font-family:'Space Grotesk'; font-size:1.6rem; font-weight:700; color:var(--blue);" id="sAvgWater">-</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">AVG WATER</div>
                </div>
                <div style="text-align:center; padding:1rem; background:var(--bg); border-radius:10px;">
                    <div style="font-family:'Space Grotesk'; font-size:1.6rem; font-weight:700; color:var(--success);" id="sStreak">-</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">DAY STREAK</div>
                </div>
                <div style="text-align:center; padding:1rem; background:var(--bg); border-radius:10px;">
                    <div style="font-family:'Space Grotesk'; font-size:1.6rem; font-weight:700; color:var(--danger);" id="sWeightLoss">-</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); font-weight:600;">WEIGHT CHANGE</div>
                </div>
            </div>
        </div>
    </section>
</div>

</div><!-- /content -->

<!-- ChatGPT FAB -->
<a href="https://chat.openai.com" target="_blank" class="chat-fab" title="Ask ChatGPT">

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('track')"><span class="nav-icon">📋</span>Track</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const SK = 'fast-v3';
function getData() { return JSON.parse(localStorage.getItem(SK) || '{}'); }
function saveData(d) { localStorage.setItem(SK, JSON.stringify(d)); }
function todayKey() { return new Date().toISOString().split('T')[0]; }

let selectedDay = todayKey();

function getDayData(k) {
    const d = getData();
    return d[k] || { weight: null, water: 0, routine: [], proto: '16:8', eatStart: null, eatEnd: null, fastHours: 0, foodNote: '' };
}
function setDayData(k, v) { const d = getData(); d[k] = v; saveData(d); }

// ═══════════════════════════════════════
// ROUTINE ITEMS
// ═══════════════════════════════════════
const ROUTINE = [
    { time: 'AM', text: '🏋️ Early morning exercise' },
    { time: '9:30', text: '🥣 Breakfast' },
    { time: '12:00', text: '🍵 Green tea' },
    { time: '13:30', text: '🍛 Lunch' },
    { time: '16:30', text: '🍉 Watermelon + Lemon water + Snacks' },
    { time: '19:00', text: '🍽️ Dinner' },
    { time: 'PM', text: '🚶 Night walk before bed' }
];

// ═══════════════════════════════════════
// MOTIVATION
// ═══════════════════════════════════════
const QUOTES = [
    "Your body is not a temple. It's a machine. Feed it right, push it hard, it performs.",
    "16 hours of fasting is nothing. You sleep through half of it.",
    "Every hour fasting, your body burns stored fat. That's the deal.",
    "Discipline weighs ounces. Regret weighs tons.",
    "You don't have to be extreme. Just consistent.",
    "The scale is a trend, not a verdict. Trust the process.",
    "Hunger is temporary. The results are permanent.",
    "You're not starving. You're giving your body time to heal.",
    "Small daily improvements lead to stunning results.",
    "The first week is the hardest. After that, your body adapts.",
    "Water is your best friend during fasting. Drink up.",
    "Every completed day is proof you can do this.",
    "Autophagy kicks in around 16 hours. That's cellular cleanup.",
    "You chose this. That means you can do this.",
    "Progress, not perfection. One day at a time."
];

function showMotivation() {
    const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById('quoteText').textContent = q;
}

// ═══════════════════════════════════════
// DAY SELECTOR
// ═══════════════════════════════════════
function renderDaySelector() {
    const container = document.getElementById('daySelector');
    const start = new Date(getStartDate());
    const data = getData();
    let html = '';

    for (let i = 0; i < 15; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const key = d.toISOString().split('T')[0];
        const dayName = d.toLocaleDateString('en', { weekday: 'short' }).slice(0, 2);
        const isActive = key === selectedDay;
        const hasData = data[key] && (data[key].weight || (data[key].routine && data[key].routine.length > 0));
        html += `<div class="day-pill ${isActive ? 'active' : ''} ${hasData ? 'has-data' : ''}" onclick="selectDay('${key}')">
            <div class="dp-day">${dayName}</div>
            <div class="dp-num">${d.getDate()}</div>
        </div>`;
    }
    container.innerHTML = html;

    // Scroll to active
    setTimeout(() => {
        const active = container.querySelector('.active');
        if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
    }, 100);
}

function getStartDate() {
    let s = localStorage.getItem('fast-v3-start');
    if (!s) { s = todayKey(); localStorage.setItem('fast-v3-start', s); }
    return s;
}

function selectDay(key) {
    selectedDay = key;
    renderDaySelector();
    loadDayUI();
}

// ═══════════════════════════════════════
// LOAD DAY UI
// ═══════════════════════════════════════
function loadDayUI() {
    const day = getDayData(selectedDay);

    // Weight
    if (day.weight) {
        document.getElementById('weightDisplay').innerHTML = day.weight + '<span class="weight-unit"> kg</span>';
    } else {
        document.getElementById('weightDisplay').innerHTML = '--<span class="weight-unit"> kg</span>';
    }
    updateWeightChange();

    // Water
    document.getElementById('waterCount').textContent = day.water || 0;

    // Protocol
    document.querySelectorAll('.proto-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(day.proto === '14:10' ? 'proto14' : 'proto16').classList.add('active');

    // Timer
    loadTimerState(day);

    // Routine
    renderRoutine(day);

    // Food note
    document.getElementById('foodNote').value = day.foodNote || '';
}

// ═══════════════════════════════════════
// WEIGHT
// ═══════════════════════════════════════
function saveWeight() {
    const v = parseFloat(document.getElementById('wInput').value);
    if (!v) return;
    const day = getDayData(selectedDay);
    day.weight = v;
    setDayData(selectedDay, day);
    document.getElementById('wInput').value = '';
    loadDayUI();
    renderDaySelector();
}

function updateWeightChange() {
    const data = getData();
    const keys = Object.keys(data).sort();
    const weights = keys.map(k => data[k].weight).filter(w => w);
    const el = document.getElementById('weightChange');
    if (weights.length >= 2) {
        const diff = (weights[weights.length - 1] - weights[0]).toFixed(1);
        if (diff < 0) { el.textContent = `↓ ${Math.abs(diff)} kg lost`; el.className = 'weight-change loss'; }
        else if (diff > 0) { el.textContent = `↑ ${diff} kg gained`; el.className = 'weight-change gain'; }
        else { el.textContent = 'No change'; el.className = 'weight-change'; }
    } else { el.textContent = ''; }
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
let timerInterval = null;

function setProto(p) {
    document.querySelectorAll('.proto-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(p === '16:8' ? 'proto16' : 'proto14').classList.add('active');
    const day = getDayData(selectedDay);
    day.proto = p;
    setDayData(selectedDay, day);
}

function startEating() {
    const day = getDayData(selectedDay);
    day.eatStart = Date.now();
    day.eatEnd = null;
    setDayData(selectedDay, day);
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display = '';
    document.getElementById('btnReset').style.display = '';
    document.getElementById('timerStatus').className = 'timer-status status-eating';
    document.getElementById('timerStatus').textContent = '🍽️ Eating Window';
    startTick();
}

function stopEating() {
    const day = getDayData(selectedDay);
    day.eatEnd = Date.now();
    const eatMins = (day.eatEnd - day.eatStart) / 60000;
    const fastGoal = day.proto === '16:8' ? 16 : 14;
    const eatHrs = (eatMins / 60).toFixed(1);
    day.fastHours = Math.max(0, (24 - parseFloat(eatHrs))).toFixed(1);
    setDayData(selectedDay, day);

    clearInterval(timerInterval);
    document.getElementById('btnStop').style.display = 'none';
    document.getElementById('btnReset').style.display = '';
    document.getElementById('timerStatus').className = 'timer-status status-fasting';
    document.getElementById('timerStatus').textContent = `✓ ${day.fastHours}h fasting today`;
    document.getElementById('timerSub').textContent = `Ate for ${eatHrs}h`;

    // Update ring to show full based on fast goal
    const progress = Math.min(parseFloat(day.fastHours) / (day.proto === '16:8' ? 16 : 14), 1);
    document.getElementById('ringFill').style.strokeDashoffset = 263.9 - (263.9 * progress);
    renderDaySelector();
}

function resetTimer() {
    if (!confirm('Reset timer for this day?')) return;
    clearInterval(timerInterval);
    const day = getDayData(selectedDay);
    day.eatStart = null; day.eatEnd = null; day.fastHours = 0;
    setDayData(selectedDay, day);
    document.getElementById('timerDigits').textContent = '00:00:00';
    document.getElementById('timerSub').textContent = 'Tap Start to begin';
    document.getElementById('timerStatus').className = 'timer-status status-idle';
    document.getElementById('timerStatus').textContent = 'Ready';
    document.getElementById('ringFill').style.strokeDashoffset = 263.9;
    document.getElementById('btnStart').style.display = '';
    document.getElementById('btnStop').style.display = 'none';
    document.getElementById('btnReset').style.display = 'none';
}

function loadTimerState(day) {
    clearInterval(timerInterval);
    if (day.eatStart && !day.eatEnd) {
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnStop').style.display = '';
        document.getElementById('btnReset').style.display = '';
        document.getElementById('timerStatus').className = 'timer-status status-eating';
        document.getElementById('timerStatus').textContent = '🍽️ Eating Window';
        if (selectedDay === todayKey()) startTick();
        else updateTimerDisplay(day);
    } else if (day.eatStart && day.eatEnd) {
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnStop').style.display = 'none';
        document.getElementById('btnReset').style.display = '';
        document.getElementById('timerStatus').className = 'timer-status status-fasting';
        document.getElementById('timerStatus').textContent = `✓ ${day.fastHours}h fasting`;
        const eatHrs = ((day.eatEnd - day.eatStart) / 3600000).toFixed(1);
        document.getElementById('timerDigits').textContent = eatHrs + 'h ate';
        document.getElementById('timerSub').textContent = `Fast: ${day.fastHours}h`;
        const progress = Math.min(parseFloat(day.fastHours) / (day.proto === '16:8' ? 16 : 14), 1);
        document.getElementById('ringFill').style.strokeDashoffset = 263.9 - (263.9 * progress);
    } else {
        document.getElementById('btnStart').style.display = '';
        document.getElementById('btnStop').style.display = 'none';
        document.getElementById('btnReset').style.display = 'none';
        document.getElementById('timerDigits').textContent = '00:00:00';
        document.getElementById('timerSub').textContent = 'Tap Start to begin';
        document.getElementById('timerStatus').className = 'timer-status status-idle';
        document.getElementById('timerStatus').textContent = 'Ready';
        document.getElementById('ringFill').style.strokeDashoffset = 263.9;
    }
}

function startTick() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => updateTimerDisplay(getDayData(selectedDay)), 1000);
    updateTimerDisplay(getDayData(selectedDay));
}

function updateTimerDisplay(day) {
    if (!day.eatStart) return;
    const elapsed = Math.floor((Date.now() - day.eatStart) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    document.getElementById('timerDigits').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('timerSub').textContent = 'Eating window open';

    const goalHrs = day.proto === '16:8' ? 8 : 10;
    const progress = Math.min((elapsed / 3600) / goalHrs, 1);
    document.getElementById('ringFill').style.strokeDashoffset = 263.9 - (263.9 * progress);
}

// ═══════════════════════════════════════
// WATER
// ═══════════════════════════════════════
function changeWater(delta) {
    const day = getDayData(selectedDay);
    day.water = Math.max(0, (day.water || 0) + delta);
    setDayData(selectedDay, day);
    document.getElementById('waterCount').textContent = day.water;
}

// ═══════════════════════════════════════
// ROUTINE
// ═══════════════════════════════════════
function renderRoutine(day) {
    document.getElementById('routineList').innerHTML = ROUTINE.map((item, i) => {
        const done = day.routine && day.routine.includes(i);
        return `<div class="routine-item ${done ? 'done' : ''}" onclick="toggleRoutine(${i})">
            <div class="r-check">${done ? '✓' : ''}</div>
            <div class="r-time">${item.time}</div>
            <div class="r-text">${item.text}</div>
        </div>`;
    }).join('');
}

function toggleRoutine(i) {
    const day = getDayData(selectedDay);
    if (!day.routine) day.routine = [];
    const idx = day.routine.indexOf(i);
    if (idx > -1) day.routine.splice(idx, 1);
    else day.routine.push(i);
    setDayData(selectedDay, day);
    renderRoutine(day);
    renderDaySelector();
}

// ═══════════════════════════════════════
// FOOD NOTE
// ═══════════════════════════════════════
function saveFoodNote() {
    const day = getDayData(selectedDay);
    day.foodNote = document.getElementById('foodNote').value;
    setDayData(selectedDay, day);
}

// ═══════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════
function updateAnalytics() {
    const data = getData();
    const start = new Date(getStartDate());
    const days = [];
    for (let i = 0; i < 15; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const key = d.toISOString().split('T')[0];
        days.push({ date: key, ...(data[key] || {}) });
    }

    const fasts = days.filter(d => d.fastHours > 0);
    document.getElementById('sAvgFast').textContent = fasts.length ? (fasts.reduce((s,d) => s + parseFloat(d.fastHours), 0) / fasts.length).toFixed(1) + 'h' : '-';

    const waters = days.filter(d => d.water > 0);
    document.getElementById('sAvgWater').textContent = waters.length ? Math.round(waters.reduce((s,d) => s + d.water, 0) / waters.length) + ' gl' : '-';

    // Streak
    let streak = 0;
    for (let i = days.length - 1; i >= 0; i--) {
        if (days[i].routine && days[i].routine.length >= 4) streak++;
        else break;
    }
    document.getElementById('sStreak').textContent = streak + ' days';

    const weights = days.filter(d => d.weight).map(d => d.weight);
    document.getElementById('sWeightLoss').textContent = weights.length >= 2 ? (weights[weights.length-1] - weights[0]).toFixed(1) + ' kg' : '-';

    drawChart(days);
}

function drawChart(days) {
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height;
    const pad = { t: 15, r: 15, b: 25, l: 40 };
    ctx.clearRect(0, 0, w, h);

    const valid = days.filter(d => d.weight).map(d => d.weight);
    if (valid.length < 2) { ctx.fillStyle = '#6b7094'; ctx.font = '12px Inter'; ctx.textAlign = 'center'; ctx.fillText('Log 2+ days to see trend', w/2, h/2); return; }

    const minW = Math.min(...valid) - 0.5, maxW = Math.max(...valid) + 0.5;
    const pw = w - pad.l - pad.r, ph = h - pad.t - pad.b;

    ctx.strokeStyle = '#1e1e35'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 3; i++) { const y = pad.t + (ph/3)*i; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke(); ctx.fillStyle = '#6b7094'; ctx.font = '9px Space Grotesk'; ctx.textAlign = 'right'; ctx.fillText((maxW-(maxW-minW)*(i/3)).toFixed(1), pad.l-6, y+3); }

    // Gradient fill under line
    const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
    grad.addColorStop(0, 'rgba(0, 229, 255, 0.2)');
    grad.addColorStop(1, 'rgba(0, 229, 255, 0)');

    const pts = [];
    days.forEach((d, i) => { if (!d.weight) return; const x = pad.l + (i/14)*pw; const y = pad.t + ((maxW-d.weight)/(maxW-minW))*ph; pts.push({x,y}); });

    // Fill
    if (pts.length >= 2) {
        ctx.beginPath();
        ctx.moveTo(pts[0].x, h - pad.b);
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(pts[pts.length-1].x, h - pad.b);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
    }

    // Line
    ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.beginPath();
    pts.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
    ctx.stroke();

    // Dots
    pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fillStyle = '#00e5ff'; ctx.fill(); ctx.strokeStyle = '#1a1b2e'; ctx.lineWidth = 2; ctx.stroke(); });

    // X labels
    ctx.fillStyle = '#6b7094'; ctx.font = '9px Inter'; ctx.textAlign = 'center';
    [0,4,9,14].forEach(i => { ctx.fillText('D'+(i+1), pad.l + (i/14)*pw, h-6); });
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(t) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
    const idx = ['track','analytics'].indexOf(t);
    document.querySelectorAll('.nav-item')[idx].classList.add('active');
    if (t === 'analytics') updateAnalytics();
}

// ═══════════════════════════════════════
// RESET
// ═══════════════════════════════════════
function resetAll() { if (!confirm('Delete ALL data?')) return; localStorage.removeItem(SK); localStorage.removeItem('fast-v3-start'); location.reload(); }

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
showMotivation();
renderDaySelector();
loadDayUI();
</script>
